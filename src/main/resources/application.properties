# ===== Server =====
server.port=8082

# ===== Database (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/backendutcc?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===== External APIs (??????????) =====
sentiment.api.base-url=http://127.0.0.1:8000
sentiment.timeout.seconds=5

# ===== Typhoon (Self-host) =====
typhoon.base-url=http://localhost:8000
typhoon.api-key=
typhoon.model=local-model

# ===== JSON output =====
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
